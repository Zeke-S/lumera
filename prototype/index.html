<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumera 前端原型（静态交互）</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <div class="shell" aria-label="平台壳层">
        <aside class="sidebar" aria-label="侧边导航">
          <div class="sidebarBrand">
            <div class="logo" aria-hidden="true"></div>
            <div class="brandText">
              <div class="brandTitle">曜境 Lumera</div>
              <div class="brandSubtitle">视频生成平台 · 原型</div>
            </div>
          </div>

          <nav class="nav" aria-label="主导航">
            <a class="navItem" href="#/projects" data-route="projects">项目</a>
            <a class="navItem" href="#/workbench" data-route="workbench">工作台</a>
            <a class="navItem" href="#/render" data-route="render">渲染中心</a>
            <a class="navItem" href="#/branches" data-route="branches">版本/分枝</a>
            <a class="navItem" href="#/export" data-route="export">导出/发布</a>
            <a class="navItem" href="#/me" data-route="me">个人中心</a>
            <a class="navItem" href="#/settings" data-route="settings">设置</a>
          </nav>

          <div class="sidebarFoot">
            <div class="smallMuted">快捷键：⌘K 聚焦 Omnibar</div>
          </div>
        </aside>

        <section class="main" aria-label="主内容区">
          <header class="topbar" aria-label="顶部栏">
            <div class="topbarLeft">
              <div id="pageTitle" class="pageTitle">工作台</div>
              <div id="pageSubtitle" class="pageSubtitle">从意图到分镜，再到渲染与发布</div>
            </div>
            <div class="topbarRight">
              <button id="toggleAssets" class="btn btnGhost" type="button">资产库</button>
              <button id="toggleBranchingMap" class="btn btnGhost" type="button">分枝导航</button>
            </div>
          </header>

          <main id="viewRoot" class="viewRoot" aria-label="视图根"></main>
        </section>

        <aside id="assetsDrawer" class="assetsDrawer" aria-label="资产库抽屉" hidden>
          <div class="panelHeader">
            <div class="panelTitle">资产库</div>
            <button id="closeAssets" class="btn btnGhost" type="button">关闭</button>
          </div>
          <div class="panelBody">
            <div class="panelHint">图片 / 视频 / 音频 / 字体 / 3D 资产（原型占位）。</div>
            <div id="assetList" class="assetList"></div>
          </div>
        </aside>

      </main>
    </div>

    <script type="module" src="./src/app/init.js"></script>
  </body>
</html>
